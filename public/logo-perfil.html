<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Logo Awin - Guia do Busão</title>
  <style>
    body {
      background-color: #111827;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      color: white;
      font-family: sans-serif;
    }
    .logo-container {
      background-color: #0a0e1a;
      width: 500px;
      height: 500px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .instrucoes {
      margin-top: 20px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="logo-container" id="logo">
    <svg width="300" height="300" viewBox="0 0 32 32" fill="none">
      <rect x="4" y="6" width="24" height="18" rx="4" stroke="url(#grad1)" stroke-width="2.5"/>
      <circle cx="10" cy="27" r="2.5" fill="url(#grad1)"/>
      <circle cx="22" cy="27" r="2.5" fill="url(#grad1)"/>
      <rect x="8" y="10" width="6" height="5" rx="1.5" fill="url(#grad1)" opacity="0.5"/>
      <rect x="18" y="10" width="6" height="5" rx="1.5" fill="url(#grad1)" opacity="0.5"/>
      <defs>
        <linearGradient id="grad1" x1="0" y1="0" x2="32" y2="32">
          <stop stop-color="#00d4ff"/>
          <stop offset="1" stop-color="#7c3aed"/>
        </linearGradient>
      </defs>
    </svg>
  </div>

  <div class="instrucoes">
    <h2>Aqui está o seu logo exato, em alta resolução!</h2>
    <p>Use a ferramenta de captura do Windows (Windows + Shift + S) para recortar o quadrado do fundo azul escuro e salvar como imagem.</p>
  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aguarde... Redirecionando | Guia do Busão</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <style>
    body {
      background: var(--bg-dark);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }
    .redirect-container {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 40px 30px;
      text-align: center;
      max-width: 450px;
      width: 90%;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      animation: fadeIn 0.5s ease-out forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .logo-text {
      font-size: 1.8rem;
      margin-bottom: 30px;
    }
    .spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-left-color: var(--primary-light);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 30px auto;
    }
    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
    h2 {
      font-size: 1.3rem;
      color: white;
      margin-bottom: 15px;
      line-height: 1.4;
    }
    p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.5;
      margin-bottom: 25px;
    }
    .route-info {
      background: rgba(15, 23, 42, 0.6);
      padding: 15px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      margin-bottom: 20px;
    }
    .route-info strong {
      color: var(--primary-light);
    }
    .partner-text {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <div class="redirect-container">
    <h1 class="logo-text">Guia do<span class="logo-accent"> Busão</span></h1>
    
    <div class="spinner"></div>
    
    <h2 id="status-title">Preparando sua viagem...</h2>
    
    <div class="route-info" id="route-details" style="display: none;">
      <div style="margin-bottom: 8px;">De: <strong id="val-origin">...</strong></div>
      <div>Para: <strong id="val-dest">...</strong></div>
    </div>
    
    <p>Estamos conectando você de forma segura ao portal oficial da viação para a escolha das poltronas.</p>
    
    <div class="partner-text">Redirecionamento Seguro</div>
  </div>

  <script src="/redirect.js"></script>
</body>
</html>

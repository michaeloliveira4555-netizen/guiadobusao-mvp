<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Administrativo | Guia do Busão</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <style>
    body { padding-top: 80px; }
    .admin-container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px;
    }
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }
    .admin-card {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 30px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .form-group label {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-secondary);
    }
    .form-group input {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      padding: 10px 14px;
      border-radius: 8px;
      font-family: inherit;
    }
    .routes-table-container {
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    th {
      color: var(--text-secondary);
      font-weight: 500;
      font-size: 0.9rem;
    }
    .action-btn {
      background: rgba(239, 68, 68, 0.2);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.3);
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.2s;
    }
    .action-btn:hover {
      background: #ef4444;
      color: white;
    }
    
    /* Login Overlay */
    #login-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: var(--bg-dark);
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .login-box {
      background: rgba(30, 41, 59, 0.9);
      padding: 40px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      text-align: center;
      width: 100%;
      max-width: 400px;
    }
    .login-box h2 { margin-bottom: 20px; }
    .login-box input {
      width: 100%;
      margin-bottom: 20px;
      text-align: center;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <!-- Overlay de Login -->
  <div id="login-overlay">
    <div class="login-box">
      <h2>Área Restrita</h2>
      <p style="color: var(--text-secondary); margin-bottom: 20px;">Digite a senha mestra para acessar</p>
      <input type="password" id="password-input" placeholder="••••••••" />
      <button class="btn-primary" id="login-btn" style="width: 100%">Entrar</button>
      <p id="login-error" style="color: #f87171; margin-top: 15px; font-size: 0.9rem; display: none;">Senha incorreta</p>
    </div>
  </div>

  <header class="header">
    <div class="header-container">
      <a href="/" class="logo">Guia do Busão <span style="font-size: 0.8rem; color: var(--primary-light)">Admin</span></a>
      <button class="btn-primary" id="logout-btn" style="padding: 8px 16px; font-size: 0.9rem;">Sair</button>
    </div>
  </header>

  <main class="admin-container">
    <div class="admin-header">
      <h2>Gestão de Rotas</h2>
      <span style="color: var(--text-secondary)" id="total-routes">Carregando...</span>
    </div>

    <!-- Formulário de Adição -->
    <div class="admin-card">
      <h3 style="margin-bottom: 20px;">Adicionar Nova Rota Real</h3>
      <form id="add-route-form">
        <div class="form-grid">
          <div class="form-group">
            <label>Origem</label>
            <input type="text" id="route-origin" placeholder="Ex: Porto Alegre" required>
          </div>
          <div class="form-group">
            <label>Destino</label>
            <input type="text" id="route-destination" placeholder="Ex: Florianópolis" required>
          </div>
          <div class="form-group">
            <label>Viação</label>
            <input type="text" id="route-company" placeholder="Ex: Santo Anjo" required>
          </div>
          <div class="form-group">
            <label>Preço (R$)</label>
            <input type="number" id="route-price" step="0.01" placeholder="150.00" required>
          </div>
          <div class="form-group">
            <label>Hora Saída (HH:MM)</label>
            <input type="time" id="route-departure" required>
          </div>
          <div class="form-group">
            <label>Hora Chegada (HH:MM)</label>
            <input type="time" id="route-arrival" required>
          </div>
          <div class="form-group">
            <label>Link Direto (Opcional)</label>
            <input type="url" id="route-link" placeholder="https://...">
          </div>
        </div>
        <button type="submit" class="btn-primary" id="submit-route-btn">Adicionar Rota</button>
      </form>
    </div>

    <!-- Tabela de Rotas -->
    <div class="admin-card">
      <h3 style="margin-bottom: 20px;">Rotas Cadastradas</h3>
      <div class="routes-table-container">
        <table>
          <thead>
            <tr>
              <th>Origem</th>
              <th>Destino</th>
              <th>Viação</th>
              <th>Saída</th>
              <th>Chegada</th>
              <th>Preço</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="routes-tbody">
            <tr><td colspan="7" style="text-align: center">Carregando rotas...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="/admin.js"></script>
</body>
</html>
